name: Android E2E

on:
  pull_request:
    paths:
      - 'android/**'
      - 'config.json'
      - 'tests/e2e_raw_github_config.sh'
      - 'tests/e2e_android_gradle_jvm_compat.sh'
      - '.github/workflows/android-e2e.yml'

jobs:
  connected-android-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Validate live config endpoint (no mocks)
        run: bash tests/e2e_raw_github_config.sh

      - name: Validate config fallback path (no mocks)
        run: bash tests/e2e_raw_github_config_fallback.sh

      - name: Run instrumentation E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest
