name: Android Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate live config endpoint (no mocks)
        run: bash tests/e2e_raw_github_config.sh

      - name: Validate config fallback path (no mocks)
        run: bash tests/e2e_raw_github_config_fallback.sh

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Verify Gradle wrapper version guard (AGP compatibility E2E)
        run: bash tests/e2e_android_gradle_wrapper_guard.sh

      - name: Run JVM unit tests (wrapper/JVM compatibility E2E)
        run: bash tests/e2e_android_gradle_jvm_compat.sh

      - name: Verify Gradle JVM-compat E2E keeps non-parallel execution guard
        run: bash tests/e2e_android_gradle_non_parallel_guard.sh

      - name: Verify workflows do not trigger on push
        run: bash tests/e2e_workflow_no_push_guard.sh

      - name: Verify workflows include live checks and instrumentation E2E
        run: bash tests/e2e_workflow_live_checks_guard.sh
